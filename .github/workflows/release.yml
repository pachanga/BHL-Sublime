name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build .sublime-package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          zip -r BHL-Sublime-${VERSION}.sublime-package \
            BHL.sublime-syntax \
            LSP-bhl.sublime-settings \
            plugin.py \
            .python-version \
            README.md

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: '*.sublime-package'
